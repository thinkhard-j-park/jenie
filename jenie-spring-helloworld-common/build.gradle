plugins {
    id 'java'
}

group = 'org.jenie'
version = '0.0.1-SNAPSHOT'

ext {
    springBomVersion = '6.1.10'
    junitBom = '5.10.2'

}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation platform("org.springframework:spring-framework-bom:${springBomVersion}")
    implementation 'org.springframework:spring-core'

    testImplementation platform("org.junit:junit-bom:${junitBom}")
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}