syntax = "proto3";

package org.jenie.spring.helloworld;

option java_package = "org.jenie.spring.helloworld.dto.board";
option java_outer_classname = "BoardProto";
option java_multiple_files = true;

message BoardMessage {
  string id = 1;
  string name = 2;
  string root_id = 3;
  string parent_id = 4;
}
