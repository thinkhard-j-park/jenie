syntax = "proto3";

package org.jenie.spring.helloworld;

import "org/jenie/spring/helloworld/dto/article/article_header.proto";

option java_package = "org.jenie.spring.helloworld.dto.article";
option java_outer_classname = "ArticleProto";
option java_multiple_files = true;

message ArticleMessage {
  ArticleHeaderMessage header = 1;
  string content = 2;
}
