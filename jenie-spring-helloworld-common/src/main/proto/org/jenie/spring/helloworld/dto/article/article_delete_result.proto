syntax = "proto3";

package org.jenie.spring.helloworld;

import "google/protobuf/timestamp.proto";

option java_package = "org.jenie.spring.helloworld.dto.article";
option java_outer_classname = "ArticleDeleteProto";
option java_multiple_files = true;

message ArticleDeleteResultMessage {
  string id = 1;
  sint32 state = 2;
  google.protobuf.Timestamp deleted_at = 3;
}
