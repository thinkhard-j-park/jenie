import org.springframework.boot.gradle.plugin.SpringBootPlugin

buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath("org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}")
        classpath("io.spring.javaformat:spring-javaformat-gradle-plugin:${springJavaFormatVersion}")
    }
}

description = "Jenie, Java Genie!"

def bootProjects = ['jenie-spring-data-mongodb', 'jenie-spring-helloworld', 'jenie-spring-test']
def testProjects = ['jenie-spring-test']
def containerizeProjects = ['jenie-spring-helloworld']

ext {
    mainProjs = subprojects.findAll{ it.name !in testProjects}
    testProjs = subprojects.findAll{ it.name in testProjects}
    bootProjs = subprojects.findAll{ it.name in bootProjects}
    containerProjs = subprojects.findAll{ it.name in containerizeProjects}
}

configure(allprojects) { project ->
    apply plugin: 'java'
    apply plugin: 'maven-publish'
    apply plugin: 'io.spring.javaformat'
    apply plugin: 'checkstyle'

    group = 'org.jenie'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }

    dependencies {
        checkstyle("io.spring.javaformat:spring-javaformat-checkstyle:${springJavaFormatVersion}")
    }

    repositories {
        mavenCentral()
        maven {
            url = uri("${repoUrl}")
            credentials {
                username = project.findProperty("gpr.user") ?: System.getenv("GITHUB_ACTOR")
                password = project.findProperty("gpr.key") ?: System.getenv("GITHUB_TOKEN")
            }
        }
    }

    publishing {
        publications {
            gpr(MavenPublication) {
                from components.java
            }
        }
        repositories {
            maven {
                name = "GitHubPackages"
                url = "${repoUrl}"
                credentials {
                    username = System.getenv("GITHUB_ACTOR")
                    password = System.getenv("GITHUB_TOKEN")
                }
            }
        }
    }
}

configure(mainProjs) {
    apply plugin: 'jacoco'

    jacoco {
        setReportsDirectory(file("${rootDir}/.qodana/code-coverage"))
    }

    jacocoTestReport {
        reports {
            xml.required = true
            html.required = false
        }
        finalizedBy 'jacocoTestCoverageVerification'
    }

    jacocoTestCoverageVerification {
        violationRules {
            rule {
                enabled = true
                element = 'CLASS'
                // includes = []

                limit {
                    counter = 'LINE'
                    value = 'COVEREDRATIO'
                    minimum = 0.00
                }

                excludes = []
            }
        }
    }

    test {
        useJUnitPlatform()
        finalizedBy 'jacocoTestReport'
    }
}

configure(bootProjs) {
    apply plugin: 'org.springframework.boot'

    dependencies {
        implementation platform(SpringBootPlugin.BOM_COORDINATES)
    }
}

configure(containerProjs) {
    apply plugin: 'com.google.cloud.tools.jib' version '3.4.3'

    jib {
        from {
            image = 'eclipse-temurin:21'
        }
        to {
            image = "ghcr.io/thinkhard-j-park/${project.name}"
            auth {
                username = System.getenv("GITHUB_ACTOR")
                password = System.getenv("GITHUB_TOKEN")
            }
            tags = ["${version}", 'latest']
        }
    }

}

configure(testProjs) {
    test {
        useJUnitPlatform()
    }
}
