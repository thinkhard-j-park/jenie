name: Qodana
on:
  workflow_dispatch:
  pull_request:
    branches: # Specify your branches here
      - develop
      - main # The 'main' branch
      - 'releases/*' # The release branches

jobs:
  jenie-spring-data-mongodb:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0  # a full history is required for pull request analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Check Format, Style
        run: ./gradlew :jenie-spring-data-mongodb:checkFormat :jenie-spring-data-mongodb:checkStyleMain :jenie-spring-data-mongodb:checkStyleTest
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Run Tests
        run: ./gradlew :jenie-spring-data-mongodb:test
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Archive coverage data
        uses: actions/upload-artifact@v4
        with:
          name: jenie-spring-data-mongodb_code-coverage
          path: .qodana/code-coverage

      - name: 'Qodana jenie-spring-data-mongodb'
        uses: JetBrains/qodana-action@v2024.2
        with:
          pr-mode: false
          args: |
            --source-directory,jenie-spring-data-mongodb,
            --config,qodana.yaml
          artifact-name: jenie-spring-data-mongodb
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_585012182 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
          GITHUB_ACTOR: ${{ secrets.GITHUB_ACTOR }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

