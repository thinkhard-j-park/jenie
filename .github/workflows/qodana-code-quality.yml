name: Qodana
on:
  workflow_dispatch:
  pull_request:
    branches: # Specify your branches here
      - develop
      - main # The 'main' branch
      - 'releases/*' # The release branches

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      packages: read
    strategy:
      matrix:
        project:
          - jenie-spring-core
          - jenie-spring-data-mongodb
          - jenie-spring-helloworld-common
          - jenie-spring-helloworld-web
          - jenie-spring-helloworld-rest
          - jenie-spring-helloworld-armeria-grpc
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }} # to check out the pull request commit
          fetch-depth: 0 # a full history is required for pull request analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Check Format, Style ${{ matrix.project }}
        run: ./gradlew :${{ matrix.project }}:checkFormat :${{ matrix.project }}:checkStyleMain :${{ matrix.project }}:checkStyleTest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests
        run: ./gradlew :${{ matrix.project }}:test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive coverage data ${{ matrix.project }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}_code-coverage
          path: .qodana/code-coverage

      - name: Qodana Analysis ${{ matrix.project }}
        uses: JetBrains/qodana-action@v2024.3
        with:
          pr-mode: false
          args: |
            -e,GITHUB_ACTOR=${{ secrets.GITHUB_ACTOR }},
            -e,GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }},
            --source-directory,${{ matrix.project }},
            --config,qodana.yaml
          artifact-name: ${{ matrix.project }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_585012182 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'