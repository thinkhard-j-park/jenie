# server
spring.application.name=jenie-spring-helloworld-armeria-grpc-reactive
server.port=30009

armeria.ports[0].port=30009
armeria.access-log.type=disabled
armeria.enable-metrics=false

# mongodb
mongodb.setting.enabled=true
mongodb.setting.app-name=jenie-spring-helloworld-armeria-grpc-reactive

# logging
logging.config=classpath:logback-spring.xml