# server
spring.application.name=jenie-spring-helloworld-rest
server.port=30000

# log
server.tomcat.basedir=.
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%{yyyy-MM-dd'T'HH:mm:ssXXX}t %a %r %s %{grpc-status}o %b %D %{x-b3-traceid}i %{x-b3-spanid}i %{Referer}i %{User-Agent}i


management.endpoints.web.base-path=/monitor
management.server.port=8090

# mongodb
mongodb.setting.enabled=true
mongodb.setting.app-name=jenie-spring-helloworld-rest

# logging
logging.config=classpath:logback-spring.xml