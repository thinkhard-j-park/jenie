import org.springframework.boot.gradle.plugin.SpringBootPlugin

plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.1'
}

group = 'org.jenie'
version = '0.0.1-SNAPSHOT'

ext {
    jenieSpringDataMongodbVersion = '0.0.1-SNAPSHOT'
    jenieSpringHelloworldCommonVersion = '0.0.1-SNAPSHOT'
    mapStructVersion = '1.5.5.Final'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation platform(SpringBootPlugin.BOM_COORDINATES)
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'

    implementation 'com.github.ben-manes.caffeine:caffeine'

    implementation "org.jenie:jenie-spring-data-mongodb:${jenieSpringDataMongodbVersion}"
    implementation "org.jenie:jenie-spring-helloworld-common:${jenieSpringHelloworldCommonVersion}"

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}