import org.springframework.boot.gradle.plugin.SpringBootPlugin

plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.1'
    id 'jacoco'
    id 'maven-publish'
}

group = 'org.jenie'
version = '0.0.1-SNAPSHOT'

ext {
    jenieSpringDataMongodbVersion = '0.0.1-SNAPSHOT'
    jenieSpringHelloworldCommonVersion = '0.0.1-SNAPSHOT'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    maven {
        url = uri("https://maven.pkg.github.com/thinkhard-j-park/jenie")
        credentials {
//            username = project.findProperty("gpr.user") ?: System.getenv("GITHUB_ACTOR")
//            password = project.findProperty("gpr.key") ?: System.getenv("GITHUB_TOKEN")
            username = System.getenv("GITHUB_ACTOR")
            password = System.getenv("GITHUB_TOKEN")
        }
    }
}

dependencies {
    implementation platform(SpringBootPlugin.BOM_COORDINATES)
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'

    implementation 'com.github.ben-manes.caffeine:caffeine'

    implementation "org.jenie:jenie-spring-data-mongodb:${jenieSpringDataMongodbVersion}"
    implementation "org.jenie:jenie-spring-helloworld-common:${jenieSpringHelloworldCommonVersion}"

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

jacoco {
    setReportsDirectory(file("${rootDir}/.qodana/code-coverage"))
}

jacocoTestReport {
    reports {
        xml.required = true
        html.required = false
    }
    finalizedBy 'jacocoTestCoverageVerification'
}

jacocoTestCoverageVerification {
    violationRules {
        rule {
            enabled = true
            element = 'CLASS'
            // includes = []

            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.00
            }

            excludes = []
        }
    }
}

test {
    useJUnitPlatform()
    finalizedBy 'jacocoTestReport'
}

publishing {
    publications {
        gpr(MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            name = "GitHubPackages"
            url = "https://maven.pkg.github.com/thinkhard-j-park/jenie"
            credentials {
                username = System.getenv("GITHUB_ACTOR")
                password = System.getenv("GITHUB_TOKEN")
            }
        }
    }
}
